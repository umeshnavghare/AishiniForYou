<!DOCTYPE html>
<html>
<head>
  <title>For You 💖</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: linear-gradient(to right, #ffe6f0, #ffd6e0);
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    h1 {
      font-size: 2.5em;
      color: #ff4d6d;
    }

    /* Romantic font line */
    .romantic-text {
      font-size: 20px;
      color: #cc3366;
      font-family: "Brush Script MT", cursive;
      margin-top: 10px;
    }

    /* Heart Button */
    .heart-btn {
      margin-top: 25px;
      font-size: 18px;
      padding: 12px 25px;
      border: none;
      border-radius: 30px;
      background: #ff4d6d;
      color: white;
      cursor: pointer;
      position: relative;
      transition: 0.3s;
    }

    .heart-btn::before {
      content: "💖 ";
    }

    .heart-btn:hover {
      transform: scale(1.1);
      background: #ff1f4b;
    }

    /* Floating elements */
    .floating {
      position: absolute;
      font-size: 24px;
      animation: floatUp linear infinite;
      pointer-events: none;
      filter: drop-shadow(0 0 8px pink);
    }

    @keyframes floatUp {
      0% {
        transform: translateY(100vh) scale(1);
        opacity: 1;
      }
      100% {
        transform: translateY(-10vh) scale(1.5);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

<div>
  <h1>You are my peace 🌸</h1>
  <p class="romantic-text">Every moment with you feels like magic ✨</p>

  <button class="heart-btn" onclick="nextPage()"> ⏭️Next 💞</button>
</div>

<script>
function nextPage() {
  window.location.href = "page3.html";
}

// Floating roses + hearts
const elements = ["🌹", "❤️"];

setInterval(() => {
  let el = document.createElement("div");
  el.innerHTML = elements[Math.floor(Math.random() * elements.length)];
  el.className = "floating";

  el.style.left = Math.random() * 100 + "vw";
  el.style.animationDuration = (3 + Math.random() * 3) + "s";

  document.body.appendChild(el);

  setTimeout(() => el.remove(), 15000);
}, 200);
</script>

</body>
</html>
