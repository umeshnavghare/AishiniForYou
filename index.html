<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hey Baby ❤️</title>
  <style>
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      background: linear-gradient(to right, #ff9a9e, #fecfef);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    h1 {
      font-size: 3em;
      color: white;
    }

    button {
      padding: 15px 30px;
      font-size: 18px;
      border: none;
      border-radius: 25px;
      background: #ff4d6d;
      color: white;
      cursor: pointer;
      margin-top: 20px;
    }

    .heart {
      position: absolute;
      color: red;
      animation: float 5s infinite;
    }

    @keyframes float {
      0% { transform: translateY(100vh); }
      100% { transform: translateY(-10vh); }
    }
  </style>
</head>
<body>

<div style="text-align:center;">
  <h1>Hey Aishini Baby ❤️</h1>
  <p>I made something just for you...</p>
<button id="surpriseBtn" onclick="nextPage()">Click Me 💌</button>

<style>
#surpriseBtn {
  opacity: 0;
  transform: translateY(20px);
  transition: all 1s ease;
}

#surpriseBtn.show {
  opacity: 1;
  transform: translateY(0);
}
</style>
<script>
  // Show button after 3 seconds
  setTimeout(() => {
    document.getElementById("surpriseBtn").classList.add("show");
  }, 3000);
</script>
<script>
  function nextPage() {
    window.location.href = "Page2.html";
  }

  <style>
.floating {
  position: absolute;
  font-size: 24px;
  animation: floatUp linear infinite;
  pointer-events: none;
}

@keyframes floatUp {
  0% {
    transform: translateY(100vh) scale(1);
    opacity: 1;
  }
  100% {
    transform: translateY(-10vh) scale(1.5);
    opacity: 0;
  }
}
</style>

  // Generate floating hearts
setInterval(() => {
  let el = document.createElement("div");
  el.innerHTML = "❤️";
  el.className = "floating";
  el.style.left = Math.random() * 100 + "vw";
  el.style.animationDuration = (3 + Math.random() * 2) + "s";
  document.body.appendChild(el);

  setTimeout(() => el.remove(), 5000);
}, 400);
</script>

</body>
</html>
