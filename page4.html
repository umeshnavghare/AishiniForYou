<!DOCTYPE html>
<html>
<head>
  <title>Forever 💍</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to right, #ffccd5, #ffe6eb);
      font-family: sans-serif;
      text-align: center;
      overflow: hidden;
    }

    /* Image container */
    .image-container {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
      z-index: 1;
    }

    /* Image style */
    .love-img {
      width: 160px;
      height: 160px;
      object-fit: cover;
      border-radius: 50%;
      border: 4px solid white;
      box-shadow: 0 0 20px rgba(255, 77, 109, 0.6);
      transition: 0.3s;
    }

    .love-img:hover {
      transform: scale(1.1);
    }

    h1 {
      font-size: 2.5em;
      color: #ff3366;
      z-index: 1;
    }

    h2 {
      font-size: 1.5em;
      color: #cc3366;
      font-family: "Brush Script MT", cursive;
      z-index: 1;
    }

    /* Romantic button */
    .love-btn {
      margin-top: 20px;
      padding: 14px 30px;
      border-radius: 30px;
      border: none;
      background: linear-gradient(45deg, #ff4d6d, #ff99ac);
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 5px 20px rgba(255, 77, 109, 0.4);
      z-index: 1;
    }

    .love-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 8px 30px rgba(255, 77, 109, 0.6);
    }

    /* 🌹 Floating elements */
    .floating {
      position: absolute;
      font-size: 24px;
      animation: floatUp linear infinite;
      pointer-events: none;
      filter: drop-shadow(0 0 8px pink);
    }

    @keyframes floatUp {
      0% {
        transform: translateY(100vh);
        opacity: 1;
      }
      100% {
        transform: translateY(-10vh);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

<!-- 💖 Image -->
<div class="image-container">
  <img src="IMG_2007.jpg" class="love-img" alt="Her Photo">
</div>

<!-- 💍 Text -->
<h1>I Choose You ❤️</h1>
<h2>Every single time.</h2>

<!-- 💞 Button -->
<button class="love-btn" onclick="showLove()">Always You 💞</button>

<script>
function showLove() {
  alert("No matter what happens... I still choose you. Always ❤️");
}

// 🌹❤️ Floating hearts + roses logic
const elements = ["❤️", "🌹", "💞"];

setInterval(() => {
  let el = document.createElement("div");

  // random emoji
  el.innerHTML = elements[Math.floor(Math.random() * elements.length)];

  el.className = "floating";

  // random horizontal position
  el.style.left = Math.random() * 100 + "vw";

  // random speed
  el.style.animationDuration = (2 + Math.random() * 3) + "s";

  document.body.appendChild(el);

  // remove after animation
  setTimeout(() => el.remove(), 15000);

}, 400);
</script>

</body>
</html>
