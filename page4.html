<!DOCTYPE html>
<html>
<head>
  <title>Forever 💍</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to right, #ffccd5, #ffe6eb);
      font-family: sans-serif;
      text-align: center;
      overflow: hidden;
    }

    /* Image container */
    .image-container {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }

    /* Image style */
    .love-img {
      width: 160px;
      height: 160px;
      object-fit: cover;
      border-radius: 50%;
      border: 4px solid white;
      box-shadow: 0 0 20px rgba(255, 77, 109, 0.6);
      transition: 0.3s;
    }

    .love-img:hover {
      transform: scale(1.1);
    }

    h1 {
      font-size: 2.5em;
      color: #ff3366;
    }

    h2 {
      font-size: 1.5em;
      color: #cc3366;
      font-family: "Brush Script MT", cursive;
    }

    /* Romantic button */
    .love-btn {
      margin-top: 20px;
      padding: 14px 30px;
      border-radius: 30px;
      border: none;
      background: linear-gradient(45deg, #ff4d6d, #ff99ac);
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 5px 20px rgba(255, 77, 109, 0.4);
    }

    .love-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 8px 30px rgba(255, 77, 109, 0.6);
    }
  </style>
</head>

<body>

<!-- 💖 Images -->
<div class="image-container">
  <img src="IMG_2007.jpg" class="love-img" alt="Her Photo 1">
</div>

<!-- 💍 Text -->
<h1>I Choose You ❤️</h1>
<h2>Every single time.</h2>

<!-- 💞 Button -->
<button class="love-btn" onclick="showLove()">Always You 💞</button>

<script>
function showLove() {
  alert("No matter what happens... I still choose you. Always ❤️");
}
</script>

</body>
</html>
