<!DOCTYPE html>
<html>
<head>
  <title> Forever 💍</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: linear-gradient(to right, #ffccd5, #ffe6eb);
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    h1 {
      font-size: 3em;
      color: #ff3366;
    }

    h2 {
      font-size: 1.8em;
      color: #cc3366;
      font-family: "Brush Script MT", cursive;
    }

    /* Romantic Button */
    .love-btn {
      margin-top: 25px;
      font-size: 18px;
      padding: 14px 30px;
      border: none;
      border-radius: 30px;
      background: linear-gradient(45deg, #ff4d6d, #ff99ac);
      color: white;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 5px 20px rgba(255, 77, 109, 0.4);
    }

    .love-btn::before {
      content: "💖 ";
    }

    .love-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 8px 30px rgba(255, 77, 109, 0.6);
    }

    /* Floating Elements */
    .floating {
      position: absolute;
      font-size: 24px;
      animation: floatUp linear infinite;
      pointer-events: none;
      filter: drop-shadow(0 0 8px pink);
    }

    @keyframes floatUp {
      0% {
        transform: translateY(100vh);
        opacity: 1;
      }
      100% {
        transform: translateY(-10vh);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

<div>
  <h1>I Choose You ❤️</h1>
  <h2>Every single time.</h2>

  <button class="love-btn" onclick="showLove()">Always You 💞</button>
</div>

<script>
function showLove() {
  alert("BABY, I LOVE YOU ❤️");
}

// Floating hearts + roses
const elements = ["❤️", "💞", "🌹","💕"];

setInterval(() => {
  let el = document.createElement("div");
  el.innerHTML = elements[Math.floor(Math.random() * elements.length)];
  el.className = "floating";

  el.style.left = Math.random() * 100 + "vw";
  el.style.animationDuration = (2 + Math.random() * 3) + "s";

  document.body.appendChild(el);

  setTimeout(() => el.remove(), 5000);
}, 400);
</script>

</body>
</html>
